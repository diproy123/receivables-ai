  <script>
  // FIX: Logout navigation — compiled React CU component doesn't transition
  // back to "landing" when user/token become null. We detect sessionStorage
  // clearing (which the logout handler does) and force a clean page reload.
  (function(){
    var _origRemove = Storage.prototype.removeItem;
    var _logoutPending = false;
    Storage.prototype.removeItem = function(key) {
      _origRemove.call(this, key);
      if (key === 'al_token' && !_logoutPending) {
        _logoutPending = true;
        // Small delay to let React finish its state update
        setTimeout(function() {
          if (!sessionStorage.getItem('al_token')) {
            window.location.replace(window.location.pathname);
          }
        }, 50);
      }
    };
  })();
  </script>
