<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuditLens — AP Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Critical: DM Sans loaded with display=swap so text renders immediately with fallback -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet" />
  <!-- Non-critical: Playfair + JetBrains loaded async (only used on landing page headings + code) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <style>
    /* Inline critical CSS — instant paint while bundle loads */
    #al-splash{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    #al-splash .al-mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#dc2626,#b91c1c);display:flex;align-items:center;justify-content:center;margin-right:12px}
    #al-splash .al-mark svg{width:20px;height:20px;color:#fff}
    #al-splash .al-name{font-size:18px;font-weight:800;letter-spacing:-0.02em;color:#0f172a}
    #al-splash .al-sub{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#94a3b8;margin-top:-2px}
    #al-splash .al-spin{width:24px;height:24px;border:3px solid #e2e8f0;border-top-color:#dc2626;border-radius:50%;animation:al-sp .7s linear infinite;margin-top:20px}
    @keyframes al-sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <div id="root">
    <!-- Inline splash — visible in <200ms, removed when React hydrates -->
    <div id="al-splash">
      <div style="text-align:center">
        <div style="display:flex;align-items:center;justify-content:center">
          <div class="al-mark"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
          <div><div class="al-name">AuditLens</div><div class="al-sub">AP Intelligence</div></div>
        </div>
        <div class="al-spin" style="margin:20px auto 0"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
